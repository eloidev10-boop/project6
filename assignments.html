<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignments Management</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
    background-image: linear-gradient(
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.75)
    ),
    url("images/modern-minimalist-office-black-white.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    }

    /* HEADER */

    .header{
        padding-top: 20px;
        padding-left: 20px;
        padding-right: 20px;
      margin-bottom:30px;
    }

    .header h1{
      color:#1e3a8a;
      margin-bottom:10px;
    }

    .header p{
      color:#555;
    }

    /* CONTAINER */

    .container{
      display:grid;
      grid-template-columns:350px 1fr;
      gap:25px;
    }

    /* FORM */

    .form-box{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      height:fit-content;
    }

    .form-box h2{
      color:#1e3a8a;
      margin-bottom:20px;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#333;
    }

    input, textarea, select{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:15px;
    }

    textarea{
      resize:none;
      height:120px;
    }

    .btn{
      width:100%;
      padding:14px;
      background:#1e3a8a;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .btn:hover{
      background:#2563eb;
    }

    /* ASSIGNMENTS */

    .assignments-box{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .assignment-card{
      background:white;
      border-radius:12px;
      padding:25px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      border-left:6px solid #1e3a8a;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .title{
      font-size:22px;
      font-weight:bold;
      color:#1e3a8a;
    }

    .badge{
      background:#dbeafe;
      color:#1e40af;
      padding:6px 12px;
      border-radius:20px;
      font-size:14px;
      font-weight:bold;
    }

    .details{
      margin:15px 0;
      color:#444;
      line-height:1.6;
    }

    .info{
      display:flex;
      gap:20px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .info span{
      background:#f3f4f6;
      padding:8px 14px;
      border-radius:8px;
      font-size:14px;
    }

    /* ACTIONS */

    .actions{
      margin-top:20px;
      display:flex;
      gap:10px;
    }

    .edit-btn{
      background:#f59e0b;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:6px;
      cursor:pointer;
    }

    .delete-btn{
      background:red;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:6px;
      cursor:pointer;
    }

    .edit-btn:hover{
      background:#d97706;
    }

    .delete-btn:hover{
      background:darkred;
    }

    /* EMPTY */

    .empty{
      text-align:center;
      padding:40px;
      background:white;
      border-radius:12px;
      color:#777;
    }

    /* MOBILE */

    @media(max-width:900px){

      .container{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>
<body>

<!-- HEADER -->

<div class="header">

  <h1>📝 Assignments Management</h1>

  <p>Create, manage, and track assignments for your classes.</p>

</div>

<!-- MAIN -->

<div class="container">

  <!-- FORM -->

  <div class="form-box">

    <h2>Create Assignment</h2>

    <div class="form-group">

      <label>Assignment Title</label>

      <input
        type="text"
        id="title"
        placeholder="Enter assignment title"
      >

    </div>

    <div class="form-group">

      <label>Select Class</label>

      <select id="className">

        <option value="">Choose class</option>

        <option>S1A</option>

        <option>S1 B</option>

        <option>S1 C</option>
        <option>S4 MS1 A</option>
        <option>S4 MS1 B</option>
        <option>S4 MS1 C</option>
        <option>S4 MS2</option>
        <option>S5</option>
        <option>S6</option>

      </select>

    </div>

    <div class="form-group">

      <label>Due Date</label>

      <input type="date" id="dueDate">

    </div>

    <div class="form-group">

      <label>Description</label>

      <textarea
        id="description"
        placeholder="Write assignment instructions..."
      ></textarea>

    </div>

    <button class="btn" onclick="addAssignment()">
      Create Assignment
    </button>

  </div>

  <!-- ASSIGNMENTS LIST -->

  <div class="assignments-box" id="assignmentsContainer">

    <div class="empty">
      No assignments created yet.
    </div>

  </div>

</div>

<script>

  // STORAGE
  let assignments =
  JSON.parse(localStorage.getItem("assignments")) || [];

  // RENDER ASSIGNMENTS
  function renderAssignments(){

    const container =
    document.getElementById("assignmentsContainer");

    if(assignments.length === 0){

      container.innerHTML = `
        <div class="empty">
          No assignments created yet.
        </div>
      `;

      return;
    }

    container.innerHTML = "";

    assignments.forEach((assignment, index) => {

      container.innerHTML += `

        <div class="assignment-card">

          <div class="top">

            <div class="title">
              ${assignment.title}
            </div>

            <div class="badge">
              ${assignment.className}
            </div>

          </div>

          <div class="details">
            ${assignment.description}
          </div>

          <div class="info">

            <span>
              📅 Due:
              ${assignment.dueDate}
            </span>

            <span>
              👨‍🎓 Submissions:
              0
            </span>

          </div>

          <div class="actions">

            <button
              class="edit-btn"
              onclick="editAssignment(${index})"
            >
              Edit
            </button>

            <button
              class="delete-btn"
              onclick="deleteAssignment(${index})"
            >
              Delete
            </button>

          </div>

        </div>
      `;
    });

    localStorage.setItem(
      "assignments",
      JSON.stringify(assignments)
    );
  }

  // ADD ASSIGNMENT
  function addAssignment(){

    const title =
    document.getElementById("title").value;

    const className =
    document.getElementById("className").value;

    const dueDate =
    document.getElementById("dueDate").value;

    const description =
    document.getElementById("description").value;

    if(
      title === "" ||
      className === "" ||
      dueDate === "" ||
      description === ""
    ){

      alert("Fill all fields");

      return;
    }

    assignments.push({

      title,
      className,
      dueDate,
      description

    });

    // CLEAR FORM
    document.getElementById("title").value = "";
    document.getElementById("className").value = "";
    document.getElementById("dueDate").value = "";
    document.getElementById("description").value = "";

    renderAssignments();
  }

  // DELETE
  function deleteAssignment(index){

    const confirmDelete =
    confirm("Delete this assignment?");

    if(confirmDelete){

      assignments.splice(index, 1);

      renderAssignments();
    }
  }

  // EDIT
  function editAssignment(index){

    const assignment = assignments[index];

    document.getElementById("title").value =
    assignment.title;

    document.getElementById("className").value =
    assignment.className;

    document.getElementById("dueDate").value =
    assignment.dueDate;

    document.getElementById("description").value =
    assignment.description;

    // REMOVE OLD
    assignments.splice(index, 1);

    renderAssignments();
  }

  // INITIAL LOAD
  renderAssignments();

</script>

</body>
</html>
