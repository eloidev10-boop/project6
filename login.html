<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showport | Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  padding:20px;
}

.card{
  width:100%;
  max-width:420px;
  background:#fff;
  padding:35px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  color:#4f46e5;
  margin-bottom:10px;
}

h2{
  text-align:center;
  margin-bottom:25px;
  color:#333;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:15px;
  outline:none;
}

input:focus{
  border-color:#4f46e5;
}

button{
  width:100%;
  padding:14px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#3730a3;
}

p{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

a{
  color:#4f46e5;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

  <h1>Showport Folio</h1>
  <h2>Teacher Login</h2>

  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">

  <button onclick="login()">Login</button>

  <p>
    Don't have an account?
    <a href="signup.html">Create Account</a>
  </p>

</div>

<script src="script.js"></script>
</body>
</html>
