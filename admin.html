<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeachFolio | Admin Panel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  padding:20px;
}

/* HEADER */
header{
  text-align:center;
  color:white;
  margin-bottom:25px;
}

header h1{
  font-size:32px;
}

header p{
  opacity:0.9;
  margin-top:5px;
}

/* TABLE */
table{
  width:100%;
  max-width:1100px;
  margin:auto;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

thead{
  background:#4f46e5;
  color:white;
}

th, td{
  padding:15px;
  text-align:left;
  border-bottom:1px solid #eee;
}

tr:hover{
  background:#f5f5f5;
}

/* DELETE BUTTON */
.delete-btn{
  background:#ef4444;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

.delete-btn:hover{
  background:#b91c1c;
}

/* EMPTY MESSAGE */
.empty{
  text-align:center;
  color:white;
  margin-top:20px;
  font-size:18px;
}

</style>
</head>

<body>

<header>
  <h1>TeachFolio Admin Panel</h1>
  <p>Manage all registered teachers</p>
</header>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="teacherTable"></tbody>
</table>

<p id="emptyMsg" class="empty"></p>

<script>

let teachers = JSON.parse(localStorage.getItem("teachers")) || [];

const tableBody = document.getElementById("teacherTable");
const emptyMsg = document.getElementById("emptyMsg");

function loadTeachers(){

  tableBody.innerHTML = "";

  if(teachers.length === 0){
    emptyMsg.textContent = "No teachers registered yet";
    return;
  } else {
    emptyMsg.textContent = "";
  }

  teachers.forEach((teacher, index) => {

    tableBody.innerHTML += `
      <tr>
        <td>${teacher.name}</td>
        <td>${teacher.email}</td>
        <td>
          <button class="delete-btn" onclick="deleteTeacher(${index})">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

function deleteTeacher(index){

  let confirmDelete = confirm("Are you sure you want to delete this teacher?");

  if(!confirmDelete) return;

  teachers.splice(index, 1);

  localStorage.setItem("teachers", JSON.stringify(teachers));

  loadTeachers();

  alert("Teacher deleted successfully");
}

loadTeachers();

</script>

</body>
</html>
