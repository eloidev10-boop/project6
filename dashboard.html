<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="logo">📘 Teacher Portal</div>

    <nav>
      <a href="#">Dashboard</a>
      <a href="#">Profile</a>
      <a href="#">Classes</a>
      <a href="#">Logout</a>
    </nav>
  </header>

  <!-- WELCOME SECTION -->
  <section class="welcome">
    <h1>Welcome, Teacher 👋</h1>
    <p>Manage your classes, students, and teaching activities from your dashboard.</p>
  </section>

  <!-- STATS CARDS -->
  <section class="cards">

    <div class="card">
      <h2>📚 My Classes</h2>
      <p>0 Active Classes</p>
    </div>

    <div class="card">
      <h2>👨‍🎓 Students</h2>
      <p>0 Students</p>
    </div>

    <div class="card">
      <h2>📝 Assignments</h2>
      <p>0 Pending</p>
    </div>

    <div class="card">
      <h2>📊 Performance</h2>
      <p>Excellent</p>
    </div>

  </section>

  <!-- QUICK ACTIONS -->
  <section class="actions">
    <h2>Quick Actions</h2>

    <div class="action-buttons">
      <button>Create Assignment</button>
      <button>Mark Attendance</button>
      <button>Upload Notes</button>
      <button>View Reports</button>
    </div>
  </section>
 <script>
    const name = localStorage.getItem("teacherName");

    if (name) {
      document.getElementById("greeting").innerText =
        "Hello Teacher " + name + " 👋";
    } else {
      document.getElementById("greeting").innerText =
        "Hello Teacher 👋";
    }
  </script>
</body>
</html>
