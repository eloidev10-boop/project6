<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classes Management</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
     background-image: linear-gradient(
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.75)
    ),
    url("images/modern-minimalist-office-black-white.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
      padding:30px;
    }

    /* HEADER */

    .header{
      margin-bottom:30px;
    }

    .header h1{
      color:#1e3a8a;
      margin-bottom:10px;
    }

    .header p{
      color:#555;
    }

    /* MAIN LAYOUT */

    .container{
      display:grid;
      grid-template-columns:350px 1fr;
      gap:25px;
    }

    /* FORM */

    .form-box{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      height:fit-content;
    }

    .form-box h2{
      color:#1e3a8a;
      margin-bottom:20px;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#333;
    }

    input, select{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:15px;
    }

    .btn{
      width:100%;
      padding:14px;
      background:#1e3a8a;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .btn:hover{
      background:#2563eb;
    }

    /* CLASS CARDS */

    .classes-box{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
      gap:20px;
    }

    .class-card{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      border-top:6px solid #1e3a8a;
      transition:0.3s;
    }

    .class-card:hover{
      transform:translateY(-5px);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .class-name{
      font-size:24px;
      font-weight:bold;
      color:#1e3a8a;
    }

    .badge{
      background:#dbeafe;
      color:#1e40af;
      padding:6px 12px;
      border-radius:20px;
      font-size:13px;
      font-weight:bold;
    }

    .details{
      margin-top:15px;
      color:#444;
      line-height:1.7;
    }

    .details p{
      margin-bottom:10px;
    }

    /* ACTION BUTTONS */

    .actions{
      margin-top:20px;
      display:flex;
      gap:10px;
    }

    .edit-btn{
      background:#f59e0b;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:6px;
      cursor:pointer;
    }

    .delete-btn{
      background:red;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:6px;
      cursor:pointer;
    }

    .view-btn{
      background:#10b981;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:6px;
      cursor:pointer;
    }

    .edit-btn:hover{
      background:#d97706;
    }

    .delete-btn:hover{
      background:darkred;
    }

    .view-btn:hover{
      background:#059669;
    }

    /* EMPTY */

    .empty{
      background:white;
      padding:40px;
      border-radius:12px;
      text-align:center;
      color:#777;
    }

    /* MOBILE */

    @media(max-width:900px){

      .container{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>
<body>

<!-- HEADER -->

<div class="header">

  <h1>📚 Classes Management</h1>

  <p>Create and manage your teaching classes professionally.</p>

</div>

<!-- MAIN -->

<div class="container">

  <!-- FORM -->

  <div class="form-box">

    <h2>Create New Class</h2>

    <div class="form-group">

      <label>Class Name</label>

      <input
        type="text"
        id="className"
        placeholder="Example: S6 A"
      >

    </div>

    <div class="form-group">

      <label>Subject</label>

      <input
        type="text"
        id="subject"
        placeholder="Example: Mathematics"
      >

    </div>

    <div class="form-group">

      <label>Room Number</label>

      <input
        type="text"
        id="room"
        placeholder="Example: Room 12"
      >

    </div>

    <div class="form-group">

      <label>Schedule</label>

      <input
        type="text"
        id="schedule"
        placeholder="Example: Monday 8:00 AM"
      >

    </div>

    <button class="btn" onclick="addClass()">
      Create Class
    </button>

  </div>

  <!-- CLASSES -->

  <div class="classes-box" id="classesContainer">

    <div class="empty">
      No classes created yet.
    </div>

  </div>

</div>

<script>

  // STORAGE
  let classes =
  JSON.parse(localStorage.getItem("teacherClasses")) || [];

  // RENDER CLASSES
  function renderClasses(){

    const container =
    document.getElementById("classesContainer");

    if(classes.length === 0){

      container.innerHTML = `
        <div class="empty">
          No classes created yet.
        </div>
      `;

      return;
    }

    container.innerHTML = "";

    classes.forEach((classItem, index) => {

      container.innerHTML += `

        <div class="class-card">

          <div class="top">

            <div class="class-name">
              ${classItem.className}
            </div>

            <div class="badge">
              Active
            </div>

          </div>

          <div class="details">

            <p>
              📖 Subject:
              <strong>${classItem.subject}</strong>
            </p>

            <p>
              🏫 Room:
              <strong>${classItem.room}</strong>
            </p>

            <p>
              ⏰ Schedule:
              <strong>${classItem.schedule}</strong>
            </p>

            <p>
              👨‍🎓 Students:
              <strong>0</strong>
            </p>

          </div>

          <div class="actions">

            <button
              class="view-btn"
            >
              View
            </button>

            <button
              class="edit-btn"
              onclick="editClass(${index})"
            >
              Edit
            </button>

            <button
              class="delete-btn"
              onclick="deleteClass(${index})"
            >
              Delete
            </button>

          </div>

        </div>
      `;
    });

    // SAVE
    localStorage.setItem(
      "teacherClasses",
      JSON.stringify(classes)
    );
  }

  // ADD CLASS
  function addClass(){

    const className =
    document.getElementById("className").value;

    const subject =
    document.getElementById("subject").value;

    const room =
    document.getElementById("room").value;

    const schedule =
    document.getElementById("schedule").value;

    if(
      className === "" ||
      subject === "" ||
      room === "" ||
      schedule === ""
    ){

      alert("Fill all fields");

      return;
    }

    classes.push({

      className,
      subject,
      room,
      schedule

    });

    // CLEAR FORM
    document.getElementById("className").value = "";
    document.getElementById("subject").value = "";
    document.getElementById("room").value = "";
    document.getElementById("schedule").value = "";

    renderClasses();
  }

  // DELETE CLASS
  function deleteClass(index){

    const confirmDelete =
    confirm("Delete this class?");

    if(confirmDelete){

      classes.splice(index, 1);

      renderClasses();
    }
  }

  // EDIT CLASS
  function editClass(index){

    const classItem = classes[index];

    document.getElementById("className").value =
    classItem.className;

    document.getElementById("subject").value =
    classItem.subject;

    document.getElementById("room").value =
    classItem.room;

    document.getElementById("schedule").value =
    classItem.schedule;

    // REMOVE OLD CLASS
    classes.splice(index, 1);

    renderClasses();
  }

  // INITIAL LOAD
  renderClasses();

</script>

</body>
</html>
